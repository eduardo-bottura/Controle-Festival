<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Geral - Festival ECIM 2026</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxk7YXAF0ITQZcweP3SV59SGz4JlyHyU",
  authDomain: "festival-ecim-2026.firebaseapp.com",
  databaseURL: "https://festival-ecim-2026-default-rtdb.firebaseio.com",
  projectId: "festival-ecim-2026",
  storageBucket: "festival-ecim-2026.firebasestorage.app",
  messagingSenderId: "867847713962",
  appId: "1:867847713962:web:80971fe6b8de94e5f6ccd3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.onValue = onValue;

</script>
  <style>

@media print {

  button {
    display: none !important;
  }

  body {
    background: white !important;
    padding: 10px !important;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #000 !important;
    padding: 8px;
  }

  h1 {
    margin-bottom: 20px;
  }

}

</style>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-center mb-6">
📊 RELATÓRIO GERAL - FESTIVAL ECIM 2026
</h1>
  
<p id="dataHoraRelatorio"
   class="text-center text-gray-600 mb-3 text-sm font-semibold">
</p>
<div class="grid grid-cols-4 gap-2 mb-4">

<div class="bg-blue-600 text-white p-2 rounded-xl text-center">
<h2 class="font-bold text-sm">PIX</h2>
<p id="totalPix" class="text-lg">R$ 0,00</p>
</div>

<div class="bg-green-600 text-white p-2 rounded-xl text-center">
<h2 class="font-bold text-sm">CARTÃO</h2>
<p id="totalCartao" class="text-lg">R$ 0,00</p>
</div>

<div class="bg-yellow-500 text-white p-2 rounded-xl text-center">
<h2 class="font-bold text-sm">DINHEIRO</h2>
<p id="totalDinheiro" class="text-lg">R$ 0,00</p>
</div>
  
<div class="bg-black text-white p-2 rounded-xl text-center">
<h2 class="font-bold text-sm">TOTAL GERAL</h2>
<p id="totalGeral" class="text-lg">R$ 0,00</p>
</div>

</div>

<div class="bg-white rounded-xl shadow p-4">

<h2 class="text-2xl font-bold mb-4">
Produtos Vendidos
</h2>

<table class="w-full border-collapse">

<thead>
<tr class="bg-gray-200">
<th class="border p-2">Produto</th>
<th class="border p-2">PIX</th>
<th class="border p-2">Cartão</th>
<th class="border p-2">Dinheiro</th>
<th class="border p-2">Total</th>
</tr>
</thead>

<tbody id="tabelaProdutos">
</tbody>

</table>

</div>

<div class="flex justify-center mt-6">
  <button onclick="imprimirRelatorio()"
          class="bg-orange-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-orange-600 transition">
    🖨️ Imprimir Relatório
  </button>
</div>
 
<script>

function moeda(valor){
 return valor.toLocaleString('pt-BR',{
   style:'currency',
   currency:'BRL'
 });
}

const vendasPix =
 JSON.parse(localStorage.getItem("vendas_pix")) || {};

const vendasCartao =
 JSON.parse(localStorage.getItem("vendas_cartao")) || {};

const vendasDinheiro =
 JSON.parse(localStorage.getItem("vendas_dinheiro")) || {};

  const agora = new Date();

document.getElementById("dataHoraRelatorio").textContent =
  "Relatório emitido em: " +
  agora.toLocaleDateString('pt-BR') +
  " às " +
  agora.toLocaleTimeString('pt-BR');

let totalPix = 0;
let totalCartao = 0;
let totalDinheiro = 0;

Object.values(vendasPix).forEach(item=>{
 totalPix += item.qtd * item.valor;
});

Object.values(vendasCartao).forEach(item=>{
 totalCartao += item.qtd * item.valor;
});

Object.values(vendasDinheiro).forEach(item=>{
 totalDinheiro += item.qtd * item.valor;
});

document.getElementById("totalPix").textContent =
 moeda(totalPix);

document.getElementById("totalCartao").textContent =
 moeda(totalCartao);

document.getElementById("totalDinheiro").textContent =
 moeda(totalDinheiro);

document.getElementById("totalGeral").textContent =
 moeda(totalPix + totalCartao + totalDinheiro);

const produtos = new Set([
 ...Object.keys(vendasPix),
 ...Object.keys(vendasCartao),
 ...Object.keys(vendasDinheiro)
]);

const tbody =
 document.getElementById("tabelaProdutos");

produtos.forEach(produto=>{

 const qtdPix =
   vendasPix[produto]?.qtd || 0;

 const qtdCartao =
   vendasCartao[produto]?.qtd || 0;

 const qtdDinheiro =
   vendasDinheiro[produto]?.qtd || 0;

 const total =
   qtdPix + qtdCartao + qtdDinheiro;

 tbody.innerHTML += `
 <tr>
   <td class="border p-2">${produto}</td>
   <td class="border p-2">${qtdPix}</td>
   <td class="border p-2">${qtdCartao}</td>
   <td class="border p-2">${qtdDinheiro}</td>
   <td class="border p-2 font-bold">${total}</td>
 </tr>
 `;
});

 function imprimirRelatorio() {
  window.print();
}

</script>

</body>
</html>


</body>
